{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQ Assessment System</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Emotional Intelligence Assessment</h1>
            <p>Discover your emotional intelligence quotient</p>
        </header>
        
        <main>
            {% if errors %}
            <div class="error-message">
                <h3>Please fix the following errors:</h3>
                <ul>
                    {% for error in errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}
            
            <form method="POST" class="form-container">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="age">Age:</label>
                    <input type="number" id="age" name="age" min="18" max="80" required>
                </div>
                
                <div class="form-group">
                    <label for="gender">Gender:</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="profession">Profession:</label>
                    <select id="profession" name="profession" required>
                        <option value="">Select Profession</option>
                        {% for prof in professions %}
                        <option value="{{ prof }}">{{ prof }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <button type="submit" class="btn">Start Assessment</button>
            </form>
        </main>
    </div>
</body>
</html>
